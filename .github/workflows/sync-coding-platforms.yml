name: Aggregate External Platform Heatmap
permissions:
  contents: write

on:
  schedule:
    - cron: "0 */3 * * *" # Syncs everything silently every 3 hours
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code repo
        uses: actions/checkout@v4

      - name: Sync LeetCode Activity to Heatmap
        uses: joshcai/leetcode-sync@v1.5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          leetcode-username: "Pavithran_25"

      - name: Sync CodeChef & Other Actions
        run: |
          git config --global user.name "Platform-Sync-Bot"
          git config --global user.email "bot@github.com"
          echo "Last Sync: $(date)" > platform_sync.txt
          git add platform_sync.txt
          git commit -m "📊 Synced multi-platform submission matrices [skip ci]" || exit 0
          git push
